<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>后台登录</title>
  <style>
    :root {
      font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #f3f6fa;
      color: #1f2937;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 18px;
    }
    .box {
      width: min(380px, 100%);
      background: #fff;
      border: 1px solid #d8dee8;
      border-radius: 8px;
      padding: 22px;
      display: grid;
      gap: 12px;
      box-shadow: 0 18px 50px rgba(15, 23, 42, 0.12);
    }
    h1 {
      margin: 0 0 6px;
      font-size: 22px;
    }
    input,
    button {
      width: 100%;
      height: 40px;
      border-radius: 6px;
      font-size: 15px;
      box-sizing: border-box;
    }
    input {
      border: 1px solid #c7cfdb;
      padding: 0 10px;
      outline: none;
    }
    button {
      border: 1px solid #0f65d8;
      background: #0f65d8;
      color: #fff;
      cursor: pointer;
    }
    .msg {
      min-height: 20px;
      color: #c2410c;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <form class="box" id="form">
    <h1>后台登录</h1>
    <input id="username" autocomplete="username" placeholder="账号">
    <input id="password" type="password" autocomplete="current-password" placeholder="密码">
    <button>登录</button>
    <div class="msg" id="msg"></div>
  </form>
  <script>
    const params = new URLSearchParams(location.search);
    const next = params.get('next') || '/admin/shop-a';
    const form = document.getElementById('form');
    const msg = document.getElementById('msg');

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      msg.textContent = '';
      const response = await fetch('/api/admin/login', {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({
          username: document.getElementById('username').value.trim(),
          password: document.getElementById('password').value,
        }),
      });
      const data = await response.json();
      if (!response.ok) {
        msg.textContent = data.error || '登录失败';
        return;
      }
      location.href = next;
    });
  </script>
</body>
</html>
